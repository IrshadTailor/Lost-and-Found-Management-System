<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}Lost & Found{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header class="topbar">
    <div class="container">
        <h1 class="main-title">LOST AND FOUND MANAGEMENT SYSTEM</h1>
        <nav class="topnav">
            <a href="/">Home</a>
            <a href="/search">Search</a>
            <a href="/report/lost">Report Lost</a>
            <a href="/report/found">Report Found</a>
            {% if session.username %}
            <a href="/notifications">Notifications</a>
            <span class="muted">Hi, {{ session.username }}</span>
            <a href="/logout">Logout</a>
            {% else %}
            <a href="/register">Register</a>
            <a href="/login">Login</a>
            {% endif %}
        </nav>
    </div>
</header>

<main class="container">
{% block content %}{% endblock %}
</main>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
